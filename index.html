<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dashboard Peso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;padding:1rem}
h1{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:1rem}
.sec{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.07em;margin:1rem 0 8px}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1rem}
.mc{background:#fff;border-radius:8px;padding:10px 12px;border:.5px solid rgba(0,0,0,0.08)}
.ml{font-size:11px;color:#888;margin:0 0 2px}
.mv{font-size:19px;font-weight:500;color:#1a1a1a;margin:0}
.md{font-size:11px;margin:2px 0 0}
.dpos{color:#0F6E56}.dneg{color:#993C1D}
.tabs{display:flex;gap:5px;margin-bottom:.8rem;flex-wrap:wrap}
.tb{font-size:12px;padding:4px 11px;border-radius:999px;border:.5px solid #ccc;background:transparent;color:#666;cursor:pointer}
.tb.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.leg{display:flex;gap:12px;font-size:11px;color:#888;margin-bottom:5px}
.ld{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
.cw{position:relative;width:100%;margin-bottom:1rem}
.loader{text-align:center;padding:3rem;color:#888;font-size:14px}
.err{text-align:center;padding:2rem;color:#993C1D;font-size:13px;line-height:1.8}
.updated{font-size:11px;color:#aaa;text-align:right;margin-top:.5rem}
</style>
</head>
<body>
<h1>Composizione corporea</h1>
<p class="sub" id="subtitle">Caricamento dati...</p>
<div id="app"><div class="loader">⏳ Caricamento...</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSaUopvY9C2Gn9_yHKCYnyagjy-5_JFL-1EWcIxhNdTcskCd0h1eolIyrt_rmizDw2Hl-BzYSfjX-9t/pub?gid=0&single=true&output=csv';
const URLS = [
  'https://corsproxy.io/?' + encodeURIComponent(SHEET_CSV),
  'https://api.allorigins.win/raw?url=' + encodeURIComponent(SHEET_CSV),
  SHEET_CSV
];

async function loadData() {
  for (const url of URLS) {
    try {
      const res = await fetch(url, {cache:'no-store'});
      if (!res.ok) continue;
      const text = await res.text();
      if (text.length < 50) continue;
      const rows = parseCSV(text);
      if (rows.length > 0) return rows;
    } catch(e) { continue; }
  }
  document.getElementById('app').innerHTML = `
    <div class="err">Impossibile caricare i dati.<br>Controlla la connessione e riprova.<br><br>
    <button onclick="location.reload()" style="padding:8px 16px;border-radius:6px;border:none;background:#1a1a1a;color:#fff;cursor:pointer;font-size:13px">↺ Riprova</button></div>`;
  return null;
}

// Parser CSV corretto: gestisce campi tra virgolette con virgola decimale dentro
// Es: 07/01/2026,80,"26,1","20,8",...
function parseCSVLine(line) {
  const result = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(cur.trim());
      cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur.trim());
  return result;
}

function toFloat(s) {
  if (!s || s === '') return NaN;
  // Converte "26,1" → 26.1 oppure "26.1" → 26.1
  return parseFloat(s.replace(',', '.'));
}

function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    if (!cols[0] || !cols[1] || cols[1] === '') continue;
    const peso = toFloat(cols[1]);
    if (isNaN(peso)) continue;
    rows.push({
      d:       cols[0].length > 5 ? cols[0].substring(0,5) : cols[0],
      data:    cols[0],
      peso,                      // col 1
      bmi:     toFloat(cols[2]), // col 2
      grasso:  toFloat(cols[3]), // col 3
      mgras:   toFloat(cols[4]), // col 4
      muscolo: toFloat(cols[5]), // col 5
      mskel:   toFloat(cols[6]), // col 6
      moss:    toFloat(cols[7]), // col 7
      prot:    toFloat(cols[8]), // col 8
      acqua:   toFloat(cols[9]), // col 9
      gsub:    toFloat(cols[10]),// col 10
      gvisc:   toFloat(cols[11]),// col 11
      bmr:     toFloat(cols[12]),// col 12
      eta:     toFloat(cols[13]),// col 13
    });
  }
  return rows;
}

function mavg(data, w) {
  return data.map((v,i) => {
    const s = data.slice(Math.max(0,i-w+1), i+1).filter(x => !isNaN(x));
    return parseFloat((s.reduce((a,b)=>a+b,0)/s.length).toFixed(2));
  });
}

function delta(v, v0, inv=false) {
  if (isNaN(v)||isNaN(v0)) return '';
  const d = parseFloat((v - v0).toFixed(1));
  const better = inv ? d > 0 : d < 0;
  const sign = d > 0 ? '▲' : '▼';
  return `<span class="${better?'dpos':'dneg'}">${sign} ${Math.abs(d)}</span>`;
}

function fmt(v, dec=1) {
  return isNaN(v) ? '—' : v.toFixed(dec);
}

function render(rows) {
  if (!rows || rows.length === 0) return;
  const first = rows[0], last = rows[rows.length-1];
  const labels = rows.map(r => r.d);
  const gc = 'rgba(0,0,0,0.07)', tc = '#888';

  document.getElementById('subtitle').textContent =
    `${first.data} → ${last.data} · ${rows.length} rilevazioni`;

  document.getElementById('app').innerHTML = `
    <p class="sec">riepilogo</p>
    <div class="mgrid">
      <div class="mc"><p class="ml">Peso</p><p class="mv">${fmt(last.peso)} kg</p><p class="md">${delta(last.peso,first.peso)} kg</p></div>
      <div class="mc"><p class="ml">BMI</p><p class="mv">${fmt(last.bmi)}</p><p class="md">${delta(last.bmi,first.bmi)}</p></div>
      <div class="mc"><p class="ml">Grasso</p><p class="mv">${fmt(last.grasso)}%</p><p class="md">${delta(last.grasso,first.grasso)}%</p></div>
      <div class="mc"><p class="ml">Muscolo</p><p class="mv">${fmt(last.muscolo)} kg</p><p class="md">${delta(last.muscolo,first.muscolo,true)} kg</p></div>
      <div class="mc"><p class="ml">Acqua</p><p class="mv">${fmt(last.acqua)}%</p><p class="md">${delta(last.acqua,first.acqua,true)}%</p></div>
      <div class="mc"><p class="ml">Grasso visc.</p><p class="mv">${fmt(last.gvisc,0)}</p><p class="md">${delta(last.gvisc,first.gvisc)}</p></div>
      <div class="mc"><p class="ml">BMR</p><p class="mv">${fmt(last.bmr,0)}</p><p class="md">${delta(last.bmr,first.bmr,true)} kcal</p></div>
      <div class="mc"><p class="ml">Età corp.</p><p class="mv">${fmt(last.eta,0)}</p><p class="md">${delta(last.eta,first.eta)}</p></div>
    </div>
    <div class="tabs">
      <button class="tb active" onclick="setTab(this,'peso')">Peso</button>
      <button class="tb" onclick="setTab(this,'grasso')">Grasso %</button>
      <button class="tb" onclick="setTab(this,'muscolo')">Muscolo</button>
      <button class="tb" onclick="setTab(this,'bmi')">BMI</button>
      <button class="tb" onclick="setTab(this,'acqua')">Acqua %</button>
      <button class="tb" onclick="setTab(this,'bmr')">BMR</button>
    </div>
    <div class="leg">
      <span><span class="ld" style="background:#378ADD"></span>Valore</span>
      <span><span class="ld" style="background:#E24B4A;height:3px;border-radius:0"></span>Media 7gg</span>
    </div>
    <div class="cw" style="height:240px"><canvas id="c1" role="img" aria-label="Andamento nel tempo"></canvas></div>
    <p class="sec">composizione — inizio vs oggi</p>
    <div class="cw" style="height:190px"><canvas id="c2" role="img" aria-label="Confronto composizione"></canvas></div>
    <p class="updated">Aggiornato: ${new Date().toLocaleString('it-IT')}</p>
  `;

  const chart1 = new Chart(document.getElementById('c1'), {
    type:'line',
    data:{ labels, datasets:[
      {label:'Valore', data:rows.map(r=>r.peso), borderColor:'#378ADD', backgroundColor:'rgba(55,138,221,0.07)', borderWidth:1.5, pointRadius:2, pointHoverRadius:5, tension:0.3, fill:true},
      {label:'Media 7gg', data:mavg(rows.map(r=>r.peso),7), borderColor:'#E24B4A', borderWidth:2, pointRadius:0, tension:0.4, fill:false, borderDash:[4,3]}
    ]},
    options:{responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{mode:'index',intersect:false}},
      scales:{
        x:{ticks:{color:tc,font:{size:10},maxTicksLimit:12,maxRotation:45},grid:{color:gc}},
        y:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}
      }
    }
  });

  window._chart1 = chart1;
  window._rows = rows;

  new Chart(document.getElementById('c2'), {
    type:'bar',
    data:{ labels:['Grasso %','Muscolo kg','Acqua %','BMI'],
      datasets:[
        {label:first.data, data:[first.grasso,first.muscolo,first.acqua,first.bmi], backgroundColor:'rgba(55,138,221,0.7)', borderRadius:4},
        {label:last.data,  data:[last.grasso, last.muscolo, last.acqua, last.bmi],  backgroundColor:'rgba(15,110,86,0.75)',  borderRadius:4}
      ]
    },
    options:{responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:true, labels:{color:tc,font:{size:11},boxWidth:10,boxHeight:10}}, tooltip:{mode:'index',intersect:false}},
      scales:{
        x:{ticks:{color:tc,font:{size:11}},grid:{color:gc}},
        y:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}
      }
    }
  });
}

window.setTab = function(btn, key) {
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const vals = window._rows.map(r => r[key]);
  window._chart1.data.datasets[0].data = vals;
  window._chart1.data.datasets[1].data = mavg(vals, 7);
  window._chart1.update();
};

loadData().then(render);
</script>
</body>
</html>
